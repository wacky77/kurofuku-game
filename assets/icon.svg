<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#2a1f38"/>
      <stop offset="60%" stop-color="#12101a"/>
      <stop offset="100%" stop-color="#0b0a10"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2b8"/>
      <stop offset="45%" stop-color="#e6c14b"/>
      <stop offset="100%" stop-color="#a8862f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="106" fill="none" stroke="#e6c14b" stroke-opacity="0.28" stroke-width="4"/>

  <!-- マティーニグラス -->
  <g transform="translate(256,262)">
    <!-- 中の酒 -->
    <path d="M-118,-96 L118,-96 L14,26 L-14,26 Z" fill="#e6c14b" opacity="0.22"/>
    <!-- グラスの縁とボウル -->
    <path d="M-140,-104 L140,-104 L12,44 L-12,44 Z" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linejoin="round"/>
    <!-- ステム -->
    <rect x="-9" y="40" width="18" height="86" rx="6" fill="url(#gold)"/>
    <!-- 台座 -->
    <rect x="-72" y="120" width="144" height="20" rx="10" fill="url(#gold)"/>
    <!-- オリーブ -->
    <line x1="70" y1="-104" x2="-30" y2="30" stroke="#c9a83a" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-30" cy="34" r="20" fill="#ff5c8a"/>
    <circle cx="-30" cy="34" r="8" fill="#2a1420"/>
  </g>

  <!-- きらめき -->
  <path d="M392,116 l10,26 l26,10 l-26,10 l-10,26 l-10,-26 l-26,-10 l26,-10 Z" fill="#fff2b8"/>
  <circle cx="120" cy="150" r="8" fill="#ff5c8a"/>
</svg>
