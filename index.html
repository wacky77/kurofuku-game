<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d12">
  <title>付け回しマスター</title>
  <link rel="stylesheet" href="css/style.css?v=50">
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="assets/images/icon/icon-192.png?v=50">
  <link rel="apple-touch-icon" href="assets/images/icon/apple-touch-icon.png?v=50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="付け回し">
</head>
<body>
  <div id="phone">
    <div id="app"></div>
  </div>
  <script src="js/assets.js?v=50"></script>
  <script src="js/data.js?v=50"></script>
  <script src="js/avatars.js?v=50"></script>
  <script src="js/audio.js?v=50"></script>
  <script src="js/achieve.js?v=50"></script>
  <script src="js/game.js?v=50"></script>
  <script>
    // Service Worker 登録（オフライン対応。file:// 直開き時はスキップ）
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => { /* 非対応環境は無視 */ });
      });
    }
  </script>
</body>
</html>
